version: '3.8'

services:
  zai2api:
    build: .
    network_mode: host
    restart: unless-stopped
    environment:
      - PORT=8000
      - AUTH_TOKEN=your-api-key
      - BACKUP_TOKEN=your-zai-jwt-token
      - CAPTCHA_PROVIDER_URL=http://127.0.0.1:9876
      - RETRY_COUNT=2
      - LOG_LEVEL=info
    depends_on:
      - captcha-provider

  # Captcha Provider 需要宿主机的 Chromium
  # 建议直接在宿主机运行，不要容器化
  # 这里仅作参考
  # captcha-provider:
  #   build: ./captcha-provider
  #   network_mode: host
  #   environment:
  #     - PORT=9876
  #     - HOST=127.0.0.1
  #     - CHROMIUM_PATH=/usr/bin/chromium
